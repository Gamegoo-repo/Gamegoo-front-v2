name: Gamegoo Front Prod Deploy

on:
  push:
    branches:
      - main
      - chore/#159

jobs:
  deploy:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1) pnpm 설치 (가장 먼저!)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 2) Node 설치 (pnpm 캐시도 여기서 활성화됨)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 3) pnpm install
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4) 환경변수 .env 생성
      - name: Create .env file
        run: |
          echo "PUBLIC_APP_URL=${{ secrets.PUBLIC_APP_URL }}" >> .env
          echo "PUBLIC_API_BASE_URL=${{ secrets.PUBLIC_API_BASE_URL }}" >> .env
          echo "PUBLIC_RIOT_AUTH_URL=${{ secrets.PUBLIC_RIOT_AUTH_URL }}" >> .env
          echo "PUBLIC_RIOT_REDIRECT_URI=${{ secrets.PUBLIC_RIOT_REDIRECT_URI }}" >> .env
          echo "PUBLIC_RIOT_CLIENT_ID=${{ secrets.PUBLIC_RIOT_CLIENT_ID }}" >> .env
          echo "PUBLIC_RIOT_RESPONSE_TYPE=${{ secrets.PUBLIC_RIOT_RESPONSE_TYPE }}" >> .env
          echo "PUBLIC_RIOT_SCOPE=${{ secrets.PUBLIC_RIOT_SCOPE }}" >> .env
          echo "PUBLIC_RIOT_REDIRECT_AFTER_LOGIN=${{ secrets.PUBLIC_RIOT_REDIRECT_AFTER_LOGIN }}" >> .env
          echo "PUBLIC_SOCKET_URL=${{ secrets.PUBLIC_SOCKET_URL }}" >> .env
          echo "PUBLIC_EMAILJS_SERVICE_ID=${{ secrets.PUBLIC_EMAILJS_SERVICE_ID }}" >> .env
          echo "PUBLIC_EMAILJS_TEMPLATE_ID=${{ secrets.PUBLIC_EMAILJS_TEMPLATE_ID }}" >> .env
          echo "PUBLIC_EMAILJS_PUBLIC_KEY=${{ secrets.PUBLIC_EMAILJS_PUBLIC_KEY }}" >> .env
          echo "PUBLIC_GOOGLE_ANALYTICS=${{ secrets.PUBLIC_GOOGLE_ANALYTICS }}" >> .env
          echo "PUBLIC_GOOGLE_TAG_MANAGER=${{ secrets.PUBLIC_GOOGLE_TAG_MANAGER }}" >> .env

      # 5) Rsbuild 빌드
      - name: Build (Rsbuild)
        run: pnpm exec rsbuild build

      # 6) Stop old container
      - name: Stop old container
        run: |
          docker rm -f gamegoo-front-prod || true

      # 7) Build Docker image
      - name: Build Docker image
        run: |
          docker build -t gamegoo-front:prod .

      # 8) Run container
      - name: Run container
        run: |
          docker run -d \
            -p 80:80 \
            --name gamegoo-front-prod \
            --restart always \
            gamegoo-front:prod

      # 9) Verify container is running
      - name: Verify container is running
        run: |
          sleep 5
          docker ps
          docker logs --tail=100 gamegoo-front-prod || true
          docker inspect gamegoo-front-prod --format='{{.State.Status}} {{.State.ExitCode}} {{.State.Error}}'

      # 10) Cleanup
      - name: Cleanup
        run: |
          docker image prune -f
