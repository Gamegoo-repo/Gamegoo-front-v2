name: Task
description: 설정, 문서, 리팩토링, CI 등 기능 외 작업
title: '[chore] '
labels: ['chore']
assignees: []
body:
  - type: dropdown
    id: type
    attributes:
      label: 작업 타입
      description: 이슈 제목과 라벨도 선택한 타입에 맞게 조정해 주세요.
      options:
        - chore
        - docs
        - refactor
        - test
        - ci
        - build
        - style
        - design
        - rename
        - remove
        - init
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 작업의 목적과 배경을 작성해 주세요.
      placeholder: |
        왜 이 작업이 필요한지 작성해 주세요.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 변경할 설정, 문서, 파일, 패키지 범위를 작성해 주세요.
      placeholder: |
        - 
        -
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 완료 조건
      description: 명령어 실행, 문서 반영, 설정 적용 등 검증 가능한 조건을 작성해 주세요.
      placeholder: |
        - [ ] 
        - [ ]
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 의존성
      description: 선행 이슈나 관련 PR이 있다면 작성해 주세요.
      placeholder: '예: #6 완료 필요'
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 참고할 자료나 링크가 있다면 작성해 주세요.
    validations:
      required: false
